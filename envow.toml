[backups]
R2_ENDPOINT   = { type = "url",    required = false, example = "https://abc123.eu.r2.cloudflarestorage.com", description = "Cloudflare R2 endpoint URL — use .eu. subdomain for EU-jurisdiction buckets" }
R2_ACCESS_KEY = { type = "string", required = false, description = "R2 API token access key" }
R2_SECRET_KEY = { type = "string", required = false, description = "R2 API token secret key" }
R2_BUCKET     = { type = "string", required = false, example = "caliacraft",                              description = "R2 bucket name for world backups" }

[directories]
DATA_DIR = { type = "string", default = "$HOME/data", description = "Persistent data root — must match the vlab provisioning DATA_DIR" }
BIN_DIR  = { type = "string", default = "$HOME/bin",  description = "User binaries directory — must match the vlab provisioning BIN_DIR" }

[minecraft]
NEOFORGE_VERSION       = { type = "string", default = "21.1.233",      description = "NeoForge version (Minecraft 1.21.1)" }
SERVER_PACK_URL        = { type = "url",    required = false,           example = "https://www.curseforge.com/api/v1/mods/462042/files/8339528/download", description = "CurseForge server pack ZIP — leave unset for vanilla NeoForge" }
MC_RAM_MIN             = { type = "string", default = "4G",             description = "JVM minimum heap (-Xms)" }
MC_RAM_MAX             = { type = "string", default = "12G",            description = "JVM maximum heap (-Xmx)" }
MC_GC_THREADS          = { type = "int",    required = false,           example = "8", description = "GC thread count — defaults to min(nproc/4, 16)" }
MC_VIEW_DISTANCE       = { type = "int",    default = "6",              description = "Chunk view distance (server-side)" }
MC_SIMULATION_DISTANCE = { type = "int",    default = "4",              description = "Chunk simulation distance (mobs, redstone, etc.)" }
MC_DIFFICULTY          = { type = "string", default = "normal",         choices = ["peaceful", "easy", "normal", "hard"], description = "Game difficulty" }
MC_MOTD                = { type = "string", default = "🎲 caliacraft",  description = "Server message of the day" }
MC_MAX_PLAYERS         = { type = "int",    default = "20",             description = "Maximum concurrent players" }
MC_ONLINE_MODE         = { type = "bool",   default = "false",          description = "Enforce Mojang authentication (false = allow cracked clients)" }
MC_SPAWN_PROTECTION    = { type = "int",    default = "0",              description = "Radius of spawn protection (0 = disabled)" }
MC_ENFORCE_SECURE_PROFILE = { type = "bool", default = "false",         description = "Require signed player chat (false = allow unsigned)" }
